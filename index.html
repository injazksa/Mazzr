<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mazzr | Best Digital Deals, Promo Codes & Smart Savings Tools 2026</title>
    
    <!-- Comprehensive SEO Meta Tags -->
    <meta name="description" content="Stop overpaying. Discover Mazzr's verified promo codes, hidden digital deals, and exclusive discounts from global top brands. Use our smart saving tools. Updated daily 2026." />
    <meta name="keywords" content="promo codes, digital deals, smart savings, coupons, exclusive discounts, software deals, vpn discounts, tech deals, Mazzr, أكواد خصم, عروض رقمية, كوبونات, خصومات حصرية, توفير المال, أفضل العروض 2026, best deals 2026, money saving, exclusive offers, verified coupons" />
    <meta name="author" content="Mazzr Team" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="https://mazzr.com/" />
    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml" />
    <link rel="icon" type="image/png" href="/logo.png" />
    
    <!-- Google AdSense Verification Code -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7085619463240604" crossorigin="anonymous"></script>
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mazzr.com/" />
    <meta property="og:title" content="Mazzr | Top Secret Deals & Verified Coupons" />
    <meta property="og:description" content="Unlock exclusive discounts and tested promo codes for top brands. Let our smart tools find the best deal for you." />
    <meta property="og:image" content="https://mazzr.com/og-image.jpg" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://mazzr.com/" />
    <meta property="twitter:title" content="Mazzr | Top Secret Deals & Verified Coupons" />
    <meta property="twitter:description" content="Unlock exclusive discounts and tested promo codes for top brands. Let our smart tools find the best deal for you." />
    <meta property="twitter:image" content="https://mazzr.com/twitter-image.jpg" />

    <!-- AI/LLM Optimization (Structured Data) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Mazzr",
        "url": "https://mazzr.com/",
        "description": "Platform for the best verified digital deals, software discounts, and smart purchasing tools.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://mazzr.com/?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Mazzr Technologies",
        "url": "https://mazzr.com",
        "logo": "https://mazzr.com/logo.png",
        "sameAs": [
          "https://twitter.com/mazzr_deals",
          "https://www.linkedin.com/company/mazzr"
        ]
      }
    </script>

    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body class="bg-[#0f172a] text-slate-50">
    <div id="root"></div>
    <!-- Netlify Hidden Form -->
    <form name="newsletter" netlify netlify-honeypot="bot-field" hidden>
      <input type="email" name="email" />
    </form>
    
    <!-- Netlify Identity Widget -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
