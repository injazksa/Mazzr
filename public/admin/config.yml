backend:
  name: git-gateway
  branch: main

logo_url: "/logo.png"
media_folder: "public/images"
public_folder: "/images"
local_backend: true

collections:
  - name: "settings"
    label: "Site Settings"
    files:
      - label: "General Settings"
        name: "general"
        file: "src/data/settings.json"
        fields:
          - {label: "Site Title", name: "siteTitle", widget: "string"}
          - {label: "Ticker Messages (Arabic)", name: "tickerAr", widget: "list", field: {label: "Message", name: "msg", widget: "string"}}
          - {label: "Ticker Messages (English)", name: "tickerEn", widget: "list", field: {label: "Message", name: "msg", widget: "string"}}
          - {label: "Base User Count", name: "baseUserCount", widget: "number", default: 15420}
          - {label: "Daily Growth Rate", name: "growthRate", widget: "number", default: 12}

  - name: "data"
    label: "Website Content"
    files:
      - label: "Deals & Offers"
        name: "deals"
        file: "src/data/deals.json"
        fields:
          - label: "Deals List"
            name: "deals"
            widget: "list"
            fields:
              - {label: "ID", name: "id", widget: "number"}
              - {label: "Category", name: "category", widget: "select", options: ["tech", "subs", "health", "digital", "travel", "courses", "games", "hosting", "trading", "insurance"]}
              - {label: "Brand", name: "brand", widget: "string"}
              - {label: "Title (English)", name: "titleEn", widget: "string"}
              - {label: "Title (Arabic)", name: "titleAr", widget: "string"}
              - {label: "Description (English)", name: "descEn", widget: "text"}
              - {label: "Description (Arabic)", name: "descAr", widget: "text"}
              - {label: "Discount Badge Text", name: "discount", widget: "string"}
              - {label: "Button Text (Arabic)", name: "btnTextAr", widget: "string", default: "تفعيل الخصم ⚡"}
              - {label: "Button Text (English)", name: "btnTextEn", widget: "string", default: "Activate Discount ⚡"}
              - {label: "Promo Code", name: "code", widget: "string", required: false}
              - {label: "Affiliate Link (URL)", name: "link", widget: "string"}
              - {label: "Is Flash Deal?", name: "isFlash", widget: "boolean", default: false}
              - {label: "Rating", name: "rating", widget: "number", value_type: "float"}
              - {label: "Number of Reviews", name: "reviews", widget: "number"}
              - {label: "FOMO Badge (Optional)", name: "fomo", widget: "string", required: false}
